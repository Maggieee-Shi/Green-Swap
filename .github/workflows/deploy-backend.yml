name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "src/**"
      - "pom.xml"
      - ".github/workflows/deploy-backend.yml"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4.2.2

      - name: Set up Java 17
        uses: actions/setup-java@v4.7.0
        with:
          java-version: "17"
          distribution: "temurin"
          cache: maven

      - name: Build JAR
        run: mvn package -DskipTests

      - name: Deploy to EC2
        env:
          SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          HOST: ${{ secrets.EC2_HOST }}
        run: |
          echo "$SSH_KEY" > /tmp/deploy_key.pem
          chmod 600 /tmp/deploy_key.pem
          scp -i /tmp/deploy_key.pem -o StrictHostKeyChecking=no \
            target/GreenSwap-0.0.1-SNAPSHOT.jar \
            ec2-user@$HOST:/opt/greenswap/GreenSwap-0.0.1-SNAPSHOT.jar
          ssh -i /tmp/deploy_key.pem -o StrictHostKeyChecking=no \
            ec2-user@$HOST "sudo systemctl restart greenswap"
          rm /tmp/deploy_key.pem
